<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="iPad Pro">
  <defs>
    <linearGradient id="ipad-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1838"/>
      <stop offset="1" stop-color="#1a2a5e"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="186" rx="70" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Device body -->
  <rect x="30" y="22" width="140" height="156" rx="12" fill="#0b1126"/>
  <rect x="34" y="26" width="132" height="148" rx="8" fill="url(#ipad-screen)"/>
  <!-- Top toolbar -->
  <rect x="42" y="34" width="40" height="6" rx="2" fill="rgba(255,255,255,0.14)"/>
  <circle cx="158" cy="37" r="3" fill="#00badb"/>
  <!-- Content -->
  <rect x="42" y="50" width="116" height="58" rx="6" fill="#00badb" opacity="0.55"/>
  <rect x="42" y="116" width="52" height="10" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="42" y="130" width="80" height="8" rx="2" fill="rgba(255,255,255,0.10)"/>
  <rect x="42" y="142" width="100" height="8" rx="2" fill="rgba(255,255,255,0.10)"/>
  <rect x="42" y="154" width="40" height="18" rx="3" fill="#00badb" opacity="0.9"/>
  <!-- Camera dot on top bezel -->
  <circle cx="100" cy="24" r="1.4" fill="#555"/>
</svg>
