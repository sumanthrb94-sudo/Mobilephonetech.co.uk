<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Headphones">
  <defs>
    <linearGradient id="hp-cup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a5e"/>
      <stop offset="1" stop-color="#0f1838"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="174" rx="60" ry="5" fill="rgba(0,0,0,0.14)"/>
  <!-- Headband -->
  <path d="M 50 110 Q 50 40 100 40 Q 150 40 150 110"
        stroke="#1a2a5e" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Inner band highlight -->
  <path d="M 58 108 Q 58 52 100 52 Q 142 52 142 108"
        stroke="rgba(255,255,255,0.14)" stroke-width="2" fill="none"/>
  <!-- Left cup -->
  <rect x="34" y="96" width="36" height="58" rx="14" fill="url(#hp-cup)"/>
  <circle cx="52" cy="125" r="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="52" cy="125" r="5" fill="#00badb"/>
  <!-- Right cup -->
  <rect x="130" y="96" width="36" height="58" rx="14" fill="url(#hp-cup)"/>
  <circle cx="148" cy="125" r="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="148" cy="125" r="5" fill="#00badb"/>
  <!-- cup stems -->
  <rect x="65" y="96" width="4" height="14" fill="#1a2a5e" rx="1"/>
  <rect x="131" y="96" width="4" height="14" fill="#1a2a5e" rx="1"/>
</svg>
