<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="VR headset">
  <defs>
    <linearGradient id="vr-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#dddddd"/>
    </linearGradient>
    <linearGradient id="vr-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2a5e"/>
      <stop offset="1" stop-color="#0f1838"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="170" rx="72" ry="5" fill="rgba(0,0,0,0.14)"/>
  <!-- Strap -->
  <path d="M 10 90 Q 10 68 36 64 L 164 64 Q 190 68 190 90"
        stroke="#1a2a5e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Headset main body -->
  <rect x="30" y="62" width="140" height="82" rx="18" fill="url(#vr-body)" stroke="#cccccc"/>
  <!-- Face/Lens panel -->
  <rect x="44" y="76" width="112" height="46" rx="10" fill="url(#vr-face)"/>
  <!-- Lenses -->
  <circle cx="76" cy="99" r="14" fill="rgba(255,255,255,0.1)" stroke="#00badb" stroke-width="1.4"/>
  <circle cx="124" cy="99" r="14" fill="rgba(255,255,255,0.1)" stroke="#00badb" stroke-width="1.4"/>
  <circle cx="76" cy="99" r="5" fill="#00badb"/>
  <circle cx="124" cy="99" r="5" fill="#00badb"/>
  <!-- Status LED -->
  <circle cx="100" cy="134" r="2.5" fill="#00badb"/>
  <!-- Nose cutout -->
  <path d="M 94 122 Q 100 132 106 122" stroke="#1a2a5e" stroke-width="2" fill="none"/>
</svg>
