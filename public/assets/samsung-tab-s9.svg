<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Samsung Galaxy Tab">
  <defs>
    <linearGradient id="tab-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a5e"/>
      <stop offset="1" stop-color="#0f1838"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="184" rx="74" ry="4" fill="rgba(0,0,0,0.12)"/>
  <!-- Body -->
  <rect x="22" y="26" width="156" height="148" rx="10" fill="#0b1126"/>
  <rect x="26" y="30" width="148" height="140" rx="6" fill="url(#tab-screen)"/>
  <!-- One UI tiles -->
  <rect x="34" y="38" width="44" height="36" rx="5" fill="#00badb" opacity="0.6"/>
  <rect x="82" y="38" width="44" height="36" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="130" y="38" width="36" height="36" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="34" y="80" width="132" height="6" rx="2" fill="rgba(255,255,255,0.14)"/>
  <rect x="34" y="92" width="108" height="6" rx="2" fill="rgba(255,255,255,0.10)"/>
  <rect x="34" y="104" width="70" height="6" rx="2" fill="rgba(255,255,255,0.10)"/>
  <!-- Bottom nav dock -->
  <rect x="34" y="132" width="132" height="32" rx="6" fill="rgba(255,255,255,0.05)"/>
  <circle cx="58" cy="148" r="7" fill="#00badb" opacity="0.9"/>
  <circle cx="80" cy="148" r="7" fill="rgba(255,255,255,0.14)"/>
  <circle cx="102" cy="148" r="7" fill="rgba(255,255,255,0.14)"/>
  <circle cx="124" cy="148" r="7" fill="rgba(255,255,255,0.14)"/>
  <circle cx="146" cy="148" r="7" fill="rgba(255,255,255,0.14)"/>
  <!-- Front camera -->
  <circle cx="100" cy="32" r="1.6" fill="#555"/>
</svg>
